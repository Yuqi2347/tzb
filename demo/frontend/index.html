<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态AI助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // 配置与上一版相同，无需修改
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'background': '#FFFFFF',
                        'text-primary': '#202123',
                        'text-secondary': '#6E6E80',
                        'border-color': '#E5E5E5',
                        'ai-avatar-bg': '#10A37F',
                        'user-avatar-bg': '#5A4FF5',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans"', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 3px; }
        #chat-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        #message-input { transition: height 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-background font-sans text-text-primary min-h-screen flex flex-col">
    <!-- 初始化加载提示 (无变化) -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/95 flex flex-col items-center justify-center z-50">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-semibold mb-2">应用初始化中</h2>
        <p id="loading-status" class="text-gray-400">正在加载模型，请稍候...</p>
    </div>

    <!-- 顶部导航 -->
    <header class="border-b border-border-color py-4 px-4 md:px-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-semibold">多模态AI助手</h1>
            <!-- ==================== 新增的“新会话”按钮 ==================== -->
            <button id="new-session-btn" class="flex items-center gap-2 text-sm text-text-secondary hover:text-text-primary transition-colors border border-border-color rounded-lg px-3 py-1">
                <i class="fa fa-plus"></i>
                <span>新会话</span>
            </button>
            <button id="locate-mode-toggle" class="flex items-center gap-2 text-sm text-text-secondary hover:text-text-primary transition-colors border border-border-color rounded-lg px-3 py-1">
                <i class="fa fa-crosshairs"></i>
                <span>定位模式：关</span>
            </button>
            <!-- ========================================================== -->
        </div>
        <div class="w-8 h-8 rounded-full bg-user-avatar-bg flex items-center justify-center text-sm font-medium text-white">U</div>
    </header>

    <!-- 主要聊天区域 (无变化) -->
    <main class="flex-1 overflow-hidden flex justify-center">
        <div class="w-full max-w-3xl h-full flex flex-col">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center transition-opacity duration-300">
                    <div class="w-12 h-12 rounded-full bg-ai-avatar-bg flex items-center justify-center mb-4">
                        <i class="fa fa-robot text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-text-secondary">我能为您做些什么？</h2>
                </div>
            </div>
            <div class="w-full px-4 md:px-6 pt-4 pb-6">
                <div id="upload-preview" class="mb-3 hidden">
                    <div class="flex items-center space-x-3 bg-gray-100 rounded-xl p-3 border border-border-color">
                        <img id="preview-image" src="" alt="预览" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1 min-w-0"><p id="preview-filename" class="text-sm truncate text-text-secondary"></p></div>
                        <button id="remove-image" class="text-text-secondary hover:text-text-primary p-2"><i class="fa fa-times"></i></button>
                    </div>
                </div>
                <form id="chat-form" class="relative w-full border border-gray-300 rounded-2xl shadow-sm flex items-center p-2">
                    <button type="button" id="upload-btn" class="p-2 text-text-secondary hover:text-text-primary transition-colors"><i class="fa fa-image text-xl"></i></button>
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    <textarea id="message-input" placeholder="向我发送消息... (Ctrl+Enter 发送)" class="flex-1 bg-transparent py-2 px-2 focus:outline-none resize-none text-base placeholder-text-secondary" rows="1"></textarea>
                    <button type="submit" class="bg-black hover:bg-gray-700 text-white rounded-lg p-2 ml-2 transition-colors"><i class="fa fa-paper-plane px-1"></i></button>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
